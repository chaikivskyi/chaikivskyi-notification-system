name: notification-system
services:
    # PHP Service (Laravel Application)
    app:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        working_dir: /var/www/html
        user: "${UID:-1000}:${GID:-1000}"
        volumes:
            - .:/var/www/html
        networks:
            - laravel_network
        depends_on:
            - db

    # Nginx Service
    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - laravel_network
        depends_on:
            - app

    # MySql Service
    db:
        image: mysql/mysql-server:8.0
        environment:
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - mysql_data:/var/lib/mysql
            - ./.docker/mysql/init:/docker-entrypoint-initdb.d:ro
        ports:
            - "3306:3306"
        networks:
            - laravel_network
    kv:
        image: valkey/valkey:8
        volumes:
            - kv_data:/data
        ports:
            - "6379:6379"
        networks:
            - laravel_network
    localstack:
        image: localstack/localstack:latest
        ports:
            - "4566:4566"
        environment:
            - SERVICES=sqs
            - DEBUG=1
            - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
            - LOCALSTACK_HOST=localhost
            - AWS_ACCESS_KEY_ID=test
            - AWS_SECRET_ACCESS_KEY=test
        volumes:
            - ./.docker/localstack:/etc/localstack/init/ready.d
        networks:
            - laravel_network
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - laravel_network
        environment:
            MP_WEBHOOK_URL: 'http://${MAILPIT_WEBHOOK_USER:-webhook}:${MAILPIT_WEBHOOK_PASSWORD:-secret}@nginx/webhooks/mailpit'
            MP_WEBHOOK_LIMIT: 0
    prometheus:
        image: prom/prometheus:latest
        ports:
            - '${FORWARD_PROMETHEUS_PORT:-9090}:9090'
        volumes:
            - ./.docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        networks:
            - laravel_network
        depends_on:
            - nginx
networks:
    laravel_network:
        driver: bridge

volumes:
    mysql_data:
    kv_data:
    prometheus_data:
